name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify lockfile
        run: deno cache --frozen src/main.ts

      - name: Check formatting
        run: deno task fmt --check

      - name: Lint
        run: deno task lint

      - name: Run tests
        run: deno task test
